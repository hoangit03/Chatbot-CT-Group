[supervisord]
nodaemon=true
logfile=/var/log/supervisord.log
pidfile=/var/run/supervisord.pid

[unix_http_server]
file=/var/run/supervisor.sock

[rpcinterface:supervisor]
supervisor.rpcinterface_factory = supervisor.rpcinterface:make_main_rpcinterface

[supervisorctl]
serverurl=unix:///var/run/supervisor.sock

[program:bot_api]
command=python3 -u -m uvicorn app.api_bot:app --host 0.0.0.0 --port 7999 --workers 1
directory=/app
autostart=true
autorestart=true
stdout_logfile=/var/log/%(program_name)s_out.log
stdout_logfile_maxbytes=50MB
stderr_logfile=/var/log/%(program_name)s_err.log
stderr_logfile_maxbytes=50MB
priority=10

[program:etl_api]
command=python3 -u -m uvicorn app.api_etl:app --host 0.0.0.0 --port 8001 --workers 1
directory=/app
autostart=true
autorestart=true
stdout_logfile=/var/log/%(program_name)s_out.log
stdout_logfile_maxbytes=50MB
stderr_logfile=/var/log/%(program_name)s_err.log
stderr_logfile_maxbytes=50MB
priority=20

[program:embedder_api]
command=python3 -u -m uvicorn app.api_embedder:app --host 0.0.0.0 --port 8003 --workers 1
directory=/app
autostart=true
autorestart=true
stdout_logfile=/var/log/%(program_name)s_out.log
stdout_logfile_maxbytes=50MB
stderr_logfile=/var/log/%(program_name)s_err.log
stderr_logfile_maxbytes=50MB
priority=15


