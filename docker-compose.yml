# =============================================================
# Docker Compose — Chatbot Legacy (Tầng 3: App Layer ONLY)
# Sử dụng Core AI services (Tầng 1) + Shared Infra (Tầng 2)
# qua global_proxy_network
# =============================================================

services:
  chatbot_app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: legacy_chatbot_app
    restart: unless-stopped
    env_file:
      - .env
    volumes:
      - ./shared_data:/app/shared_data
    ports:
      - "7999:7999"
      - "8001:8001"
      - "8501:8501"
      - "8003:8003"
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://127.0.0.1:7999/api/v1/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 90s
    networks:
      - global_proxy_network

networks:
  global_proxy_network:
    external: true
