services:
  chatbot_app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: legacy_chatbot_app
    restart: unless-stopped
    env_file:
    - .env
    volumes:
    - ../shared-etl:/app/shared_data
    - ./app:/app/app
    ports:
    - 7999:7999
    - 8001:8001
    - 8501:8501
    - 8003:8003
    healthcheck:
      test:
      - CMD-SHELL
      - curl -sf http://127.0.0.1:7999/api/v1/health || exit 1
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 90s
    networks:
    - global_proxy_network
    logging:
      driver: json-file
      options:
        max-size: 50m
        max-file: '5'
networks:
  global_proxy_network:
    external: true
