services:
  paddleocr:
    image: paddlepaddle/paddle:3.3.0-gpu-cuda12.6-cudnn9.5
    container_name: paddleocr_server
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              capabilities: ["gpu"]
    ports:
      - "8080:8080"
    volumes:
      - ./shared_data/data_input:/data/input
      - ./shared_data/data_output:/data/output
      - paddleocr_cache:/root/.paddlex
    shm_size: '4gb'
    working_dir: /workspace
    command: >
      bash -c "
        apt-get update && apt-get install -y libgl1 libglib2.0-0 &&
        pip install 'paddleocr[doc-parser]' python-docx -q &&
        paddlex --install serving &&
        echo '=== PaddleOCR Server Starting ===' &&
        paddlex --serve --pipeline PP-StructureV3 --device gpu --host 0.0.0.0 --port 8080
      "
    restart: unless-stopped

  rabbitmq:
    image: rabbitmq:3-management
    container_name: rabbitmq_server
    ports:
      - "5672:5672"
      - "15672:15672"
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    restart: unless-stopped
volumes:
  paddleocr_cache:
  rabbitmq_data:
